<!DOCTYPE html>
<html>
<head>
<title>Gold Portfolio Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px}
.card{background:white;padding:20px;margin-bottom:20px;border-radius:10px}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #ddd;text-align:right}
th:nth-child(3),td:nth-child(3){text-align:left}
.green{color:green;font-weight:bold}
.red{color:red;font-weight:bold}
</style>
</head>

<body>

<h1>Gold Portfolio Dashboard</h1>

<div class="card">

<h3>Tambah LM</h3>

Gram <input id="gram" type="number">
Type <input id="type">
Harga Beli <input id="beli" type="number">

<select id="status">
<option>READY</option>
<option>PO</option>
<option>SOLD</option>
</select>

<button onclick="addData()">Tambah</button>

</div>


<div class="card">

Harga emas / gram

<input id="price" value="1600000">
<button onclick="calculate()">Update</button>

</div>


<div class="card">

<p>Total Modal Aktif: <span id="modal"></span></p>
<p>Total Realized Profit: <span id="realized"></span></p>
<p>Total Gram Aktif: <span id="gramTotal"></span></p>
<p>Nilai Portfolio: <span id="portfolio"></span></p>
<p>Unrealized P/L: <span id="unreal"></span></p>

</div>


<div class="card">

<canvas id="chart"></canvas>

</div>


<div class="card">

<table>

<thead>

<tr>
<th>No</th>
<th>Gram</th>
<th>Type</th>
<th>Beli</th>
<th>Jual</th>
<th>Status</th>
<th>Profit</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

</div>


<script>

const owner="USERNAME_GITHUB";
const repo="REPO_NAME";
const path="data.json";
const token="PASTE_TOKEN_DISINI";

let data=[];
let sha="";
let chart;


// ====================
// LOAD DATA
// ====================

async function loadData(){

const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);

const json=await res.json();

sha=json.sha;

const content=JSON.parse(atob(json.content));

data=content.transactions;

render();
calculate();

}


// ====================
// SAVE DATA
// ====================

async function saveData(){

const content={
transactions:data
};

const body={
message:"update gold data",
content:btoa(JSON.stringify(content,null,2)),
sha:sha
};

await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{

method:"PUT",

headers:{
Authorization:`token ${token}`
},

body:JSON.stringify(body)

});

loadData();

}


// ====================
// ADD DATA
// ====================

function addData(){

const gram=parseFloat(document.getElementById("gram").value);
const type=document.getElementById("type").value;
const beli=parseFloat(document.getElementById("beli").value);
const status=document.getElementById("status").value;

let jual=0;

if(status=="SOLD"){

let price=parseFloat(document.getElementById("price").value);

jual=gram*price;

}

data.push({gram,type,beli,jual,status});

saveData();

}


// ====================
// RENDER
// ====================

function render(){

const tbody=document.getElementById("tbody");

tbody.innerHTML="";

data.forEach((d,i)=>{

let profit=d.status=="SOLD"?d.jual-d.beli:null;

let cls=profit>0?"green":profit<0?"red":"";

tbody.innerHTML+=`

<tr>

<td>${i+1}</td>

<td>${d.gram}</td>

<td>${d.type}</td>

<td>${d.beli.toLocaleString()}</td>

<td>${d.jual?d.jual.toLocaleString():""}</td>

<td>${d.status}</td>

<td class="${cls}">
${profit?profit.toLocaleString():""}
</td>

</tr>

`;

});

}


// ====================
// CALCULATE
// ====================

function calculate(){

let price=parseFloat(document.getElementById("price").value);

let modal=0;
let realized=0;
let gram=0;

let statusCount={READY:0,PO:0,SOLD:0};

data.forEach(d=>{

statusCount[d.status]++;

if(d.status=="SOLD"){

realized+=d.jual-d.beli;

}else{

modal+=d.beli;
gram+=d.gram;

}

});

let portfolio=gram*price;

let unreal=portfolio-modal;

document.getElementById("modal").innerHTML=modal.toLocaleString();
document.getElementById("realized").innerHTML=realized.toLocaleString();
document.getElementById("gramTotal").innerHTML=gram;
document.getElementById("portfolio").innerHTML=portfolio.toLocaleString();
document.getElementById("unreal").innerHTML=unreal.toLocaleString();

if(chart)chart.destroy();

chart=new Chart(document.getElementById("chart"),{

type:"doughnut",

data:{
labels:Object.keys(statusCount),
datasets:[{data:Object.values(statusCount)}]
}

});

}


// INIT

loadData();

</script>

</body>
</html>
